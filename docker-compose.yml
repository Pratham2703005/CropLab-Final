services:
  backend:
    build: ./Backend
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    # Mount the GEE service account at runtime so it stays out of the image.
    # The backend falls back to this file when GEE_* env vars are not set.
    volumes:
      - ./Backend/earth-engine-service-account.json:/app/earth-engine-service-account.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build: ./Frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  # Local AWS emulator used for the ECS deployment exercise.
  # It is in the "ecs" profile so a plain `docker-compose up` ignores it.
  # Start only this service:  docker-compose --profile ecs up -d ministack
  ministack:
    image: ministackorg/ministack
    profiles: ["ecs"]
    ports:
      - "4566:4566"
    volumes:
      # Gives MiniStack access to the host Docker daemon so ECS run-task
      # can actually launch the croplab-backend / croplab-frontend containers.
      - /var/run/docker.sock:/var/run/docker.sock
